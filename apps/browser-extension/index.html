<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=470,initial-scale=1" />
		<title>QRcodly</title>
		<style>
			body {
				margin: 0;
				background: #fafafa;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
			}
			#splash {
				width: 470px;
				height: 600px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 32px;
				background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
			}
			#splash.hidden {
				opacity: 0;
				transition: opacity 0.3s ease-out;
				pointer-events: none;
			}
			/* QR code container with subtle shadow */
			#splash .qr-wrap {
				padding: 24px;
				background: #fff;
				border-radius: 20px;
				box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
			}
			#splash .qr-grid {
				display: grid;
				grid-template-columns: repeat(7, 1fr);
				gap: 4px;
				width: 154px;
				height: 154px;
				position: relative;
			}
			#splash .qr-cell {
				border-radius: 3px;
				animation: qr-wave 2.4s ease-in-out infinite;
			}
			#splash .qr-cell.on { background: #0f172a; }
			#splash .qr-cell.off { background: #e2e8f0; }
			#splash .scan-line {
				position: absolute;
				left: -4px; right: -4px;
				height: 3px;
				border-radius: 2px;
				background: linear-gradient(90deg, transparent 0%, #3b82f6 30%, #6366f1 50%, #3b82f6 70%, transparent 100%);
				opacity: 0.8;
				animation: qr-scan 2.2s ease-in-out infinite;
			}
			/* Brand section */
			#splash .brand {
				display: flex;
				align-items: center;
				gap: 10px;
				color: #94a3b8;
				font-size: 14px;
				font-weight: 500;
				letter-spacing: 0.02em;
			}
			#splash .brand img { width: 24px; height: 24px; }
			/* Shimmer dots */
			#splash .dots {
				display: flex;
				gap: 6px;
			}
			#splash .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: #cbd5e1;
				animation: dot-pulse 1.4s ease-in-out infinite;
			}
			#splash .dot:nth-child(2) { animation-delay: 0.2s; }
			#splash .dot:nth-child(3) { animation-delay: 0.4s; }
			@keyframes qr-wave {
				0%, 100% { opacity: 0.35; transform: scale(0.92); }
				50% { opacity: 1; transform: scale(1); }
			}
			@keyframes qr-scan {
				0%, 8% { top: -2px; opacity: 0; }
				15% { opacity: 0.8; }
				50% { top: calc(100% + 2px); opacity: 0.8; }
				58%, 100% { top: calc(100% + 2px); opacity: 0; }
			}
			@keyframes dot-pulse {
				0%, 100% { opacity: 0.3; transform: scale(0.8); }
				50% { opacity: 1; transform: scale(1); }
			}
			#root { display: none; }
			#root.ready { display: block; }
		</style>
	</head>
	<body>
		<div id="splash">
			<div class="qr-wrap">
				<div class="qr-grid" id="qr-grid"></div>
			</div>
			<div class="brand">
				<img src="./icon-48.png" alt="" />
				<span>QRcodly</span>
			</div>
			<div class="dots">
				<div class="dot"></div>
				<div class="dot"></div>
				<div class="dot"></div>
			</div>
		</div>
		<div id="root"></div>
		<script src="./splash.js"></script>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
